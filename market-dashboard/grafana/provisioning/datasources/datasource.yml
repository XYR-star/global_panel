apiVersion: 1

datasources:
  - name: Market Postgres
    uid: market-postgres
    type: postgres
    access: proxy
    url: postgres:5432
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: ${POSTGRES_DB}
      postgresVersion: 1600
      sslmode: disable
      timescaledb: false
    editable: false
    isDefault: true

