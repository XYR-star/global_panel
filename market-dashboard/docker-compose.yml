services:
  postgres:
    image: postgres:16
    container_name: market-dashboard-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${MARKET_DATA_ROOT:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  portfolio-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    ports:
      - "127.0.0.1:${PORTFOLIO_HTTP_PORT:-8001}:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PORTFOLIO_ADMIN_USERNAME: ${PORTFOLIO_ADMIN_USERNAME:-admin}
      PORTFOLIO_ADMIN_PASSWORD: ${PORTFOLIO_ADMIN_PASSWORD}
      PORTFOLIO_SESSION_SECRET: ${PORTFOLIO_SESSION_SECRET:-${POSTGRES_PASSWORD}}
      PORTFOLIO_MAX_UPLOAD_BYTES: ${PORTFOLIO_MAX_UPLOAD_BYTES:-26214400}
      PORTFOLIO_LOGIN_FAILURE_LIMIT: ${PORTFOLIO_LOGIN_FAILURE_LIMIT:-5}
      PORTFOLIO_LOGIN_LOCKOUT_MINUTES: ${PORTFOLIO_LOGIN_LOCKOUT_MINUTES:-30}
      PORTFOLIO_UPLOAD_ROOT: /var/lib/portfolio-app/uploads
      PORTFOLIO_AKSHARE_ENABLED: ${PORTFOLIO_AKSHARE_ENABLED:-false}
    volumes:
      - .:/app:ro
      - ${PORTFOLIO_DATA_ROOT:-/var/lib/portfolio-app}:/var/lib/portfolio-app
